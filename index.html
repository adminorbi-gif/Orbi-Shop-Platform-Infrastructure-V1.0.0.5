    <title>Orbi Shop</title>
    <link rel="icon" type="image/png" href="https://limcgmcytzvotxhthqiu.supabase.co/storage/v1/object/public/PLATFROM%20STOCKS/Platform%20Logos/OrbiShop_Logo_Blue.png" />
    <link rel="apple-touch-icon" href="https://limcgmcytzvotxhthqiu.supabase.co/storage/v1/object/public/PLATFROM%20STOCKS/Platform%20Logos/OrbiShop_Logo_Blue.png" />
    <link rel="canonical" href="https://shop.orbifinancial.com" />
    <meta property="og:url" content="https://shop.orbifinancial.com" />
    <script id="dynamic-seo-schema"></script>
    <script>
      (function() {
        var base = window.location.origin;
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.setAttribute('href', base + window.location.pathname + window.location.search);
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) ogUrl.setAttribute('content', base + window.location.pathname + window.location.search);

        var schemaEl = document.getElementById('dynamic-seo-schema');
        if (schemaEl) {
          schemaEl.type = 'application/ld+json';
          var schemaData = {
            "@context": "https://schema.org",
            "@type": "ItemList",
            "name": "Orbi Shop Marketplace Navigation",
            "description": "Deep link crawl map for Orbi Shop Marketplace items, helping index pages directly on Google and external search providers.",
            "itemListElement": [
              {
                "@type": "ListItem",
                "position": 1,
                "name": "Orbi Shop Home Marketplace - Buyer Shop",
                "url": base + "/"
              },
              {
                "@type": "ListItem",
                "position": 2,
                "name": "About Us & Secure Escrow Information",
                "url": base + "/?about=true"
              },
              {
                "@type": "ListItem",
                "position": 3,
                "name": "Staff and Merchant Registration",
                "url": base + "/?seller-signup=true"
              },
              {
                "@type": "ListItem",
                "position": 4,
                "name": "Seller & Administrator System Login",
                "url": base + "/?seller-login=true"
              },
              {
                "@type": "ListItem",
                "position": 5,
                "name": "Seller Product Portal Manager",
                "url": base + "/?seller-productportal=true"
              },
              {
                "@type": "ListItem",
                "position": 6,
                "name": "My Tracking Status Dashboard",
                "url": base + "/?track=true"
              }
            ]
          };
          schemaEl.textContent = JSON.stringify(schemaData, null, 2);
        }
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
